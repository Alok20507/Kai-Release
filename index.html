<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Kai</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 40px 20px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            color: #8b949e;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 40px;
        }
        .download-btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        .download-btn:hover {
            transform: scale(1.03);
            opacity: 0.95;
        }
        .download-btn:active {
            transform: scale(0.98);
        }
        .footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">🌙</div>
        <h1>Kai</h1>
        <p>Experience ad-free anime and cinema streaming with a premium OLED aesthetic.</p>
        
        <!-- The button that triggers our smart javascript download -->
        <a href="#" id="downloadLink" class="download-btn">Download Latest APK</a>
        
        <div class="footer">
            &copy; 2026 Kai. All Rights Reserved.
        </div>
    </div>

    <script>
        // Smart script to fetch the current live link from version.txt dynamically!
        const txtUrl = 'https://raw.githubusercontent.com/Alok20507/Kai-Release/main/version.txt';
        const fallbackUrl = 'https://github.com/Alok20507/Kai-Release/releases';

        fetch(txtUrl)
            .then(response => response.text())
            .then(text => {
                // Split lines and get Line 2 (index 1) which contains the absolute APK URL
                const lines = text.split('\n');
                if (lines.length >= 2 && lines[1].trim().startsWith('http')) {
                    document.getElementById('downloadLink').href = lines[1].trim();
                } else {
                    document.getElementById('downloadLink').href = fallbackUrl;
                }
            })
            .catch(error => {
                console.error('Error fetching version info:', error);
                document.getElementById('downloadLink').href = fallbackUrl;
            });
    </script>

</body>
</html>
