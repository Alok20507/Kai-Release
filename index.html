<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Kai</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0c10;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 40px 20px;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            color: #8b949e;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        
        /* Updated Version Text Style */
        .version-display {
            color: #a78bfa; /* Soft purple to match the logo */
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 35px;
            display: block;
            letter-spacing: 0.5px;
            background: rgba(167, 139, 250, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        /* Modern, Interactive Gradient Button */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #6b21a8, #3b82f6); /* Kai Logo Colors */
            color: #ffffff;
            padding: 16px 36px;
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .download-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #7c3aed, #2563eb);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        /* Download Icon SVG */
        .download-icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="icon.png" alt="Kai Icon" class="app-icon">
        <h1>Kai</h1>
        <p>Experience ad-free anime and cinema streaming with a premium OLED aesthetic.</p>
        
        <!-- Enclosed in a styled pill -->
        <div class="version-display" id="versionText">Fetching latest version...</div>
        <br>
        
        <a href="#" id="downloadLink" class="download-btn">
            <!-- Modern Download SVG Icon -->
            <svg class="download-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Download Latest APK
        </a>
        
        <div class="footer">
            &copy; 2026 Kai. All Rights Reserved.
        </div>
    </div>

    <script>
        const txtUrl = 'https://raw.githubusercontent.com/Alok20507/Kai-Release/main/version.txt';
        const fallbackUrl = 'https://github.com/Alok20507/Kai-Release/releases';

        fetch(txtUrl)
            .then(response => response.text())
            .then(text => {
                const lines = text.split('\n');
                
                if (lines.length > 0 && lines[0].trim() !== '') {
                    let rawVersion = lines[0].trim();
                    
                    // Logic to automatically format "3" into "v3.0"
                    if (!rawVersion.toLowerCase().startsWith('v')) {
                        rawVersion = 'v' + rawVersion;
                    }
                    if (!rawVersion.includes('.')) {
                        rawVersion = rawVersion + '.0';
                    }
                    
                    document.getElementById('versionText').innerText = 'Latest Version: ' + rawVersion;
                } else {
                    document.getElementById('versionText').innerText = 'Latest Version';
                }

                if (lines.length >= 2 && lines[1].trim().startsWith('http')) {
                    document.getElementById('downloadLink').href = lines[1].trim();
                } else {
                    document.getElementById('downloadLink').href = fallbackUrl;
                }
            })
            .catch(error => {
                console.error('Error fetching version info:', error);
                document.getElementById('downloadLink').href = fallbackUrl;
                document.getElementById('versionText').innerText = 'Version Info Unavailable';
            });
    </script>
</body>
</html>
